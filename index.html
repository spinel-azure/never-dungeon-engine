<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <!-- Prevent accidental zoom while using the game controls on touch devices. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>3DダンジョンRPG プロトタイプ</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<main class="shell">
  <section class="game" aria-label="3Dダンジョン">
    <div class="viewport">
      <canvas id="screen" width="960" height="540"></canvas>
      <div class="status">
        <div class="readout">
          <span class="chip depth-chip" id="depth">B1F</span>
          <span class="chip coordinate-chip" id="pos">X:0 Y:0</span>
        </div>
        <div class="meter presence-meter" id="presenceMeter" role="progressbar" aria-label="気配" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
        <canvas id="compass" class="compass" width="72" height="72" aria-label="コンパス"></canvas>
        <div class="stopwatch" id="stopwatch" aria-label="探索時間">00:00:00</div>
        <div class="meter torch-meter" aria-label="たいまつ"><span id="torchMeter"></span></div>
      </div>
      <canvas id="eventOverlay" class="event-overlay" width="960" height="540" aria-hidden="true"></canvas>
      <canvas id="treasureCanvas" class="treasure-canvas" width="960" height="540" aria-hidden="true"></canvas>
    </div>
    <div class="message" id="message">10×10の床空間を、薄い境界壁が区切っている。</div>
    <div class="controls">
      <div class="brand">RANDOM MAZE TEST B1F</div>
      <div class="pad" aria-label="移動操作">
        <button id="forward" type="button" title="前進">↑</button>
        <button id="left" type="button" title="左旋回">←</button>
        <button id="back" type="button" title="後退">↓</button>
        <button id="right" type="button" title="右旋回">→</button>
        <button id="autoReturn" type="button" title="踏破済みの道だけを通ってスタート地点へ戻る">帰還</button>
        <button id="randomGenerate" type="button" title="新しいランダムダンジョンを生成する">ランダム生成</button>
      </div>
      <div class="virtual-stick" id="virtualStick" aria-label="移動用バーチャルスティック">
        <div class="virtual-stick-base">
          <div class="virtual-stick-knob"></div>
        </div>
      </div>
      <div class="action-buttons" aria-label="アクションボタン">
        <button id="buttonB" type="button" class="action-button action-button-b" aria-label="B キャンセル キャンプメニュー">B</button>
        <button id="buttonA" type="button" class="action-button action-button-a" aria-label="A 決定">A</button>
      </div>
    </div>
    <section class="menu-screen" id="menuScreen" aria-label="キャンプメニュー" hidden>
      <div class="menu-panel" data-menu-view="main">
        <h1 class="menu-title">◆メニュー◆</h1>
        <button type="button" class="menu-item is-disabled" data-menu-main="items">・アイテム（未実装）</button>
        <button type="button" class="menu-item is-disabled" data-menu-main="status">・つよさ（未実装）</button>
        <button type="button" class="menu-item is-disabled" data-menu-main="record">・きろく（未実装）</button>
        <button type="button" class="menu-item" data-menu-main="options">・オプション</button>
        <button type="button" class="menu-footer" data-menu-back>BACK</button>
      </div>
      <div class="menu-panel menu-panel-options" data-menu-view="options" hidden>
        <h1 class="menu-title">◆オプション◆</h1>
        <div class="option-page" data-option-page="0">
          <button type="button" class="option-item option-language" data-option="language">
            <span>・言語選択/LANGUAGE（未実装）</span>
            <span>日本語/JAPANESE 🔘　英語/ENGLISH ⚫</span>
          </button>
          <div class="option-section">
            <div class="option-label">・BGM（未実装）</div>
            <div class="toggle-row is-muted"><span>ON ⚫</span><span>OFF ⚫</span></div>
            <label class="volume-row option-control" data-option="bgmVolume">Volume <input id="bgmVolume" type="range" min="0" max="100" value="0" /> <span>0%</span></label>
          </div>
          <div class="option-section">
            <div class="option-label">・SE（未実装）</div>
            <div class="toggle-row is-muted"><span>ON ⚫</span><span>OFF ⚫</span></div>
            <label class="volume-row option-control" data-option="seVolume">Volume <input id="seVolume" type="range" min="0" max="100" value="0" /> <span>0%</span></label>
          </div>
        </div>
        <div class="option-page" data-option-page="1" hidden>
          <button type="button" class="option-item" data-option="random">・ランダム生成 <span data-action-state="random">ON ⚫</span></button>
          <button type="button" class="option-item" data-option="compass">・コンパス表示 <span data-option-state="compass">ON 🔘　OFF ⚫</span></button>
          <button type="button" class="option-item" data-option="readout">・座標/階層表示 <span data-option-state="readout">ON ⚫　OFF 🔘</span></button>
          <button type="button" class="option-item" data-option="autoReturn">・オート帰還 <span data-action-state="autoReturn">ON ⚫</span></button>
          <button type="button" class="option-item" data-option="torchFull">・たいまつゲージ満タン <span data-action-state="torchFull">ON ⚫</span></button>
        </div>
        <div class="option-pager">
          <button type="button" class="menu-footer" data-option-nav="back">BACK</button>
          <span class="page-indicator" data-page-indicator>1/2</span>
          <button type="button" class="menu-footer" data-option-nav="next">NEXT</button>
        </div>
      </div>
    </section>
  </section>
</main>

<script type="module" src="js/main.js"></script>
</body>
</html>
