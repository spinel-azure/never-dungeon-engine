<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#020605"><title>NDE Growth System Prototype</title><link rel="stylesheet" href="./style.css?v=20260719-1"></head>
<body><main class="screen"><header class="title"><span>×</span><h1>STATUS</h1><span>×</span></header>
<section class="identity"><strong>NO_NAME</strong><strong id="jobName">WARRIOR</strong><strong>LV <output id="levelOutput">001</output></strong><div class="vitals"><span>HP <output id="hpOutput">030 / 030</output></span><span>SP <output id="spOutput">015 / 015</output></span></div></section>
<section class="stats-panel"><h2 class="sr-only">能力値</h2><div id="statRows"></div><div class="legend"><span class="base">基礎値</span><span class="equipment">装備補正</span><span class="cards">カード補正</span><span class="empty">未使用</span></div></section>
<section class="lab"><header class="section-title"><span>×</span><h2>GROWTH LAB</h2><span>×</span></header><div class="controls"><label>JOB<select id="jobSelect"></select></label><label>LEVEL<input id="levelInput" type="range" min="1" max="197" value="1"><output id="levelValue">1</output></label></div><div class="growth-summary"><span>DECK COST <output id="deckCost">3</output></span><span>EXP <output id="experience">0000000 / 9999999</output></span></div>
<div class="bonus-editor"><div></div><strong>装備</strong><strong>カード</strong><div id="bonusInputs" class="bonus-inputs"></div></div>
<div class="preview"><label>装着プレビュー<select id="previewSource"><option value="cards">カード</option><option value="equipment">装備</option></select></label><label>能力<select id="previewStat"></select></label><label>補正<input id="previewAmount" type="number" min="0" max="30" value="3"></label><button id="previewButton" type="button">CHECK</button></div><p id="previewMessage" class="message" aria-live="polite">補正を選んで装着可否を確認できます。</p></section>
<footer>※ 能力値は最大30。上限を超える装備・カードは装着できません。</footer></main><script type="module" src="./main.js?v=20260719-3"></script></body></html>
