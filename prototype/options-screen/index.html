<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#080906">
  <title>NDE Options Screen Preview</title>
  <link rel="stylesheet" href="./style.css?v=20260720-1">
  <link rel="stylesheet" href="../dungeon-command-menu/controls/virtual-controls.css?v=20260720-1">
</head>
<body>
  <main class="prototype-shell">
    <section class="options-frame" aria-label="オプション画面">
      <h1>× OPTIONS ×</h1>
      <div id="optionList" class="option-list">
        <button type="button" data-option="language"><span>LANGUAGE</span><output>日本語</output></button>
        <button type="button" data-option="bgm"><span>BGM</span><output>ON</output></button>
        <button type="button" data-option="se"><span>SE</span><output>ON</output></button>
        <button type="button" data-option="compass"><span>COMPASS</span><output>ON</output></button>
        <button type="button" data-option="location"><span>COORDINATE / FLOOR</span><output>ON</output></button>
        <button type="button" data-option="autoReturn"><span>AUTO RETURN</span><output>ON</output></button>
      </div>
      <button id="backButton" type="button" class="back-button">BACK</button>
    </section>
    <section class="touch-controls" aria-label="タッチ操作">
      <div class="virtual-stick" id="virtualStick" aria-label="オプション移動用バーチャルパッド"><div class="virtual-stick-base"><div class="virtual-stick-knob"></div></div></div>
      <div class="action-buttons"><button id="buttonB" type="button" class="action-button action-button-b" aria-label="B 戻る">B</button><button id="buttonA" type="button" class="action-button action-button-a" aria-label="A 決定">A</button></div>
    </section>
  </main>
  <script type="module" src="./main.js?v=20260720-1"></script>
</body>
</html>
