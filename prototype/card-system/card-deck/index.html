<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#030504">
  <title>NDE Card Deck Prototype</title>
  <!-- Update this version whenever the card deck CSS or JavaScript changes. -->
  <link rel="stylesheet" href="./style.css?v=20260720-2">
  <link rel="stylesheet" href="../../dungeon-command-menu/controls/virtual-controls.css?v=20260720-2">
</head>
<body>
  <main class="prototype-shell">
    <section class="deck-screen" aria-labelledby="deckTitle">
      <header class="deck-header">
        <h1 id="deckTitle">CARD DECK</h1>
        <div class="cost-summary" aria-label="デッキコスト情報">
          <p>DECK COST <output id="deckCost">0</output></p>
          <p>TOTAL COST <output id="totalCost">48</output></p>
        </div>
      </header>

      <div id="deckGrid" class="deck-grid" role="group" aria-label="デッキのカードスロット"></div>

      <nav class="deck-actions" aria-label="デッキ操作">
        <button type="button" data-action="back">BACK</button>
        <button type="button" data-action="add">ADD CARD</button>
        <button type="button" data-action="remove">REMOVE CARD</button>
      </nav>

      <p id="statusMessage" class="status-message" aria-live="polite">
        SELECT A CARD
      </p>
    </section>
  </main>

  <section class="touch-controls" aria-label="タッチ操作">
    <div class="virtual-stick" id="virtualStick" aria-label="デッキ枠移動用バーチャルパッド"><div class="virtual-stick-base"><div class="virtual-stick-knob"></div></div></div>
    <div class="action-buttons"><button id="buttonB" type="button" class="action-button action-button-b" aria-label="B 戻る">B</button><button id="buttonA" type="button" class="action-button action-button-a" aria-label="A 決定">A</button></div>
  </section>

  <section id="cardPicker" class="card-picker" aria-labelledby="cardPickerTitle" hidden>
    <button class="picker-backdrop" type="button" data-picker-close aria-label="カード選択を閉じる"></button>
    <div class="picker-panel" role="dialog" aria-modal="true">
      <header class="picker-header">
        <div class="picker-heading">
          <h2 id="cardPickerTitle">SELECT CARD</h2>
          <p id="cardPickerMessage">SELECT A CARD</p>
        </div>
        <nav id="rarityFilters" class="rarity-filters" aria-label="レアリティフィルター">
          <button type="button" data-rarity-filter="ALL" aria-pressed="true">ALL</button>
          <button type="button" data-rarity-filter="C" aria-pressed="false">C</button>
          <button type="button" data-rarity-filter="R" aria-pressed="false">R</button>
          <button type="button" data-rarity-filter="SR" aria-pressed="false">SR</button>
          <button type="button" data-rarity-filter="L" aria-pressed="false">L</button>
          <button type="button" data-rarity-filter="Z" aria-pressed="false">Z</button>
        </nav>
        <button id="cardPickerClose" class="picker-close" type="button" aria-label="カード選択を閉じる">×</button>
      </header>
      <p id="cardPickerEmpty" class="picker-empty" aria-live="polite" hidden></p>
      <div id="cardPickerGrid" class="picker-grid" role="list" aria-label="選択可能なカード"></div>
    </div>
  </section>

  <script type="module" src="./main.js?v=20260720-2"></script>
</body>
</html>
