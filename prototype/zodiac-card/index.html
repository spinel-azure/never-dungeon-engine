<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#05060c">
  <title>NDE Zodiac Card Prototype</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="prototype-shell">
    <header class="prototype-heading">
      <p class="eyebrow">NEVER DUNGEON ENGINE</p>
      <h1>ZODIAC CARD</h1>
      <p class="instruction">カードをタップすると強く輝きます</p>
    </header>

    <section class="card-stage" aria-label="ゾディアックカード表示">
      <canvas
        id="cardCanvas"
        width="360"
        height="520"
        aria-label="最高レアリティZの牡羊座カード"
      ></canvas>
    </section>

    <section class="controls" aria-label="カード演出の設定">
      <button id="hologramButton" type="button" aria-pressed="true">
        HOLOGRAM <span>ON</span>
      </button>
      <button id="glowButton" type="button" aria-pressed="true">
        GLOW <span>STRONG</span>
      </button>
    </section>
  </main>

  <script src="./main.js" defer></script>
</body>
</html>
