<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#030504">
  <title>NDE Card Deck Prototype</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="prototype-shell">
    <section class="deck-screen" aria-labelledby="deckTitle">
      <header class="deck-header">
        <p class="screen-kicker">ZODIAC ARCHIVE</p>
        <h1 id="deckTitle">CARD DECK</h1>
        <div class="cost-summary" aria-label="デッキコスト情報">
          <p>DECK COST <output id="deckCost">0</output></p>
          <p>TOTAL COST <output id="totalCost">48</output></p>
        </div>
      </header>

      <div id="deckGrid" class="deck-grid" role="group" aria-label="デッキのカードスロット"></div>

      <nav class="deck-actions" aria-label="デッキ操作">
        <button type="button" data-action="back">BACK</button>
        <button type="button" data-action="add">ADD CARD</button>
        <button type="button" data-action="remove">REMOVE CARD</button>
      </nav>

      <p id="statusMessage" class="status-message" aria-live="polite">
        SELECT A CARD
      </p>
    </section>
  </main>

  <script src="./main.js" defer></script>
</body>
</html>
